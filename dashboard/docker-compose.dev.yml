services:
  dashboard:
    build: .
    command: ["node", "--experimental-strip-types", "--experimental-transform-types", "--watch", "backend/src/index.ts"]
    ports:
      - "127.0.0.1:3141:3141"
    volumes:
      - "${HOME}/.claude:/root/.claude:ro"
      - ./types:/app/types
      - ./backend/src:/app/backend/src
      - ./frontend/dist:/app/frontend/dist
      - ./tsconfig.base.json:/app/tsconfig.base.json
    environment:
      - HOST=0.0.0.0
      - PORT=3141
      - HOME=/root
    restart: unless-stopped
