<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <!-- Background -->
  <rect width="1280" height="640" fill="#1e1e2e"/>

  <!-- Raccoon icon (centered, pixel art) -->
  <g transform="translate(490, 80)" style="image-rendering:pixelated;">
    <svg width="300" height="300" viewBox="0 0 32 32">
      <!-- Ears (outer) -->
      <rect x="6" y="0" width="4" height="3" fill="#7f849c"/>
      <rect x="22" y="0" width="4" height="3" fill="#7f849c"/>
      <rect x="7" y="1" width="2" height="1" fill="#f5a97f"/>
      <rect x="23" y="1" width="2" height="1" fill="#f5a97f"/>
      <!-- Head -->
      <rect x="10" y="1" width="12" height="1" fill="#9399b2"/>
      <rect x="8" y="2" width="16" height="8" fill="#9399b2"/>
      <!-- Face mask -->
      <rect x="8" y="4" width="6" height="3" fill="#313244"/>
      <rect x="18" y="4" width="6" height="3" fill="#313244"/>
      <rect x="14" y="4" width="4" height="1" fill="#9399b2"/>
      <!-- Eyes -->
      <rect x="10" y="5" width="2" height="2" fill="#a6e3a1"/>
      <rect x="20" y="5" width="2" height="2" fill="#a6e3a1"/>
      <rect x="11" y="5" width="1" height="1" fill="#1e1e2e"/>
      <rect x="21" y="5" width="1" height="1" fill="#1e1e2e"/>
      <!-- Nose -->
      <rect x="14" y="7" width="4" height="2" fill="#45475a"/>
      <rect x="15" y="7" width="2" height="1" fill="#313244"/>
      <!-- Snout -->
      <rect x="12" y="8" width="8" height="2" fill="#bac2de"/>
      <rect x="13" y="9" width="2" height="1" fill="#9399b2"/>
      <rect x="17" y="9" width="2" height="1" fill="#9399b2"/>
      <!-- Hoodie -->
      <rect x="7" y="10" width="18" height="1" fill="#e78a4e"/>
      <rect x="8" y="11" width="16" height="2" fill="#e78a4e"/>
      <rect x="7" y="11" width="1" height="2" fill="#d07040"/>
      <rect x="24" y="11" width="1" height="2" fill="#d07040"/>
      <!-- Body -->
      <rect x="8" y="13" width="16" height="8" fill="#e78a4e"/>
      <rect x="8" y="13" width="1" height="8" fill="#d07040"/>
      <rect x="23" y="13" width="1" height="8" fill="#d07040"/>
      <!-- Screen -->
      <rect x="11" y="14" width="10" height="6" fill="#181825"/>
      <rect x="11" y="14" width="10" height="1" fill="#45475a"/>
      <rect x="12" y="14" width="1" height="1" fill="#f38ba8"/>
      <rect x="13" y="14" width="1" height="1" fill="#f9e2af"/>
      <rect x="14" y="14" width="1" height="1" fill="#a6e3a1"/>
      <rect x="12" y="16" width="1" height="1" fill="#a6e3a1"/>
      <rect x="13" y="16" width="1" height="1" fill="#a6e3a1"/>
      <rect x="15" y="16" width="2" height="1" fill="#cdd6f4"/>
      <rect x="12" y="18" width="3" height="1" fill="#89b4fa"/>
      <rect x="16" y="18" width="4" height="1" fill="#6c7086"/>
      <!-- Arms -->
      <rect x="5" y="13" width="3" height="5" fill="#e78a4e"/>
      <rect x="24" y="13" width="3" height="5" fill="#e78a4e"/>
      <rect x="4" y="17" width="3" height="2" fill="#9399b2"/>
      <rect x="25" y="17" width="3" height="2" fill="#9399b2"/>
      <!-- Legs -->
      <rect x="10" y="21" width="4" height="4" fill="#585b70"/>
      <rect x="18" y="21" width="4" height="4" fill="#585b70"/>
      <rect x="9" y="25" width="5" height="2" fill="#45475a"/>
      <rect x="18" y="25" width="5" height="2" fill="#45475a"/>
      <!-- Tail -->
      <rect x="25" y="17" width="3" height="2" fill="#9399b2"/>
      <rect x="27" y="19" width="3" height="2" fill="#585b70"/>
      <rect x="28" y="21" width="3" height="2" fill="#9399b2"/>
      <rect x="27" y="23" width="3" height="2" fill="#585b70"/>
      <rect x="26" y="25" width="2" height="1" fill="#9399b2"/>
    </svg>
  </g>

  <!-- Title -->
  <text x="640" y="440" text-anchor="middle" font-family="monospace" font-size="48" font-weight="bold" fill="#cdd6f4">Claude Code Toolkit</text>

  <!-- Subtitle -->
  <text x="640" y="490" text-anchor="middle" font-family="monospace" font-size="22" fill="#6c7086">Session Monitor · Web Terminal · tmux Integration</text>

  <!-- Feature pills -->
  <g transform="translate(640, 540)" text-anchor="middle" font-family="monospace" font-size="16">
    <rect x="-380" y="-20" width="140" height="32" rx="16" fill="#313244"/>
    <text x="-310" y="2" fill="#a6e3a1">⚡ Real-time</text>

    <rect x="-200" y="-20" width="160" height="32" rx="16" fill="#313244"/>
    <text x="-120" y="2" fill="#89b4fa">🖥 xterm.js</text>

    <rect x="0" y="-20" width="170" height="32" rx="16" fill="#313244"/>
    <text x="85" y="2" fill="#f9e2af">🎨 Catppuccin</text>

    <rect x="210" y="-20" width="170" height="32" rx="16" fill="#313244"/>
    <text x="295" y="2" fill="#f5c2e7">📊 Dashboard</text>
  </g>
</svg>
